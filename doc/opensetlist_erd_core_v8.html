							<head></head><body><h2 class="sr-only">OpenSetlist core schema ERD v8 — cleaned fields, affiliate links removed, genre/debutYear removed, EventSeries dates removed</h2>
<style>
#erd1 { width:100%; overflow-x:auto; padding: 0.5rem 0; }
#erd1 svg { width:100% !important; height:auto !important; }
</style>
<div id="erd1"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const diagram = `erDiagram
  Group {
    uuid id PK
    string type
    string imageUrl
  }
  GroupTranslation {
    uuid id PK
    uuid groupId FK
    string locale
    string name
    string description
  }
  ArtistGroup {
    uuid id PK
    uuid artistId FK
    uuid groupId FK
  }
  Artist {
    uuid id PK
    uuid parentArtistId FK
    string type
    string imageUrl
  }
  ArtistTranslation {
    uuid id PK
    uuid artistId FK
    string locale
    string name
    string bio
  }
  StageIdentity {
    uuid id PK
    string type
    string imageUrl
    string color
  }
  StageIdentityTranslation {
    uuid id PK
    uuid stageIdentityId FK
    string locale
    string name
  }
  StageIdentityArtist {
    uuid id PK
    uuid stageIdentityId FK
    uuid artistId FK
  }
  RealPerson {
    uuid id PK
    string imageUrl
  }
  RealPersonTranslation {
    uuid id PK
    uuid realPersonId FK
    string locale
    string name
    string stageName
  }
  RealPersonStageIdentity {
    uuid id PK
    uuid realPersonId FK
    uuid stageIdentityId FK
    date startDate
    date endDate
    string note
  }
  EventSeries {
    uuid id PK
    uuid artistId FK
    string type
    string organizerName
    string imageUrl
  }
  EventSeriesTranslation {
    uuid id PK
    uuid eventSeriesId FK
    string locale
    string name
    string description
  }
  Event {
    uuid id PK
    uuid eventSeriesId FK
    uuid parentEventId FK
    string type
    date date
    string venue
    string city
    string country
    string posterUrl
  }
  EventTranslation {
    uuid id PK
    uuid eventId FK
    string locale
    string name
  }
  SetlistItem {
    uuid id PK
    uuid eventId FK
    uuid songId FK
    int position
    bool isEncore
    string stageType
    string unitName
    string note
  }
  SetlistItemMember {
    uuid id PK
    uuid setlistItemId FK
    uuid stageIdentityId FK
    uuid realPersonId FK
  }
  Song {
    uuid id PK
    uuid artistId FK
    uuid baseVersionId FK
    string originalTitle
    string variantLabel
    date releaseDate
    string sourceNote
  }
  SongTranslation {
    uuid id PK
    uuid songId FK
    string locale
    string title
  }
  Album {
    uuid id PK
    uuid artistId FK
    string type
    date releaseDate
    string labelName
    string imageUrl
  }
  AlbumTranslation {
    uuid id PK
    uuid albumId FK
    string locale
    string title
  }
  AlbumTrack {
    uuid id PK
    uuid albumId FK
    uuid songId FK
    int trackNumber
  }

  Group ||--o{ GroupTranslation : has
  Group ||--o{ ArtistGroup : has
  Artist ||--o{ ArtistGroup : belongs_to
  Artist ||--o{ Artist : parent_of
  Artist ||--o{ ArtistTranslation : has
  Artist ||--o{ StageIdentityArtist : has
  Artist ||--o{ Song : releases
  Artist ||--o{ EventSeries : runs
  Artist ||--o{ Album : releases
  StageIdentity ||--o{ StageIdentityTranslation : has
  StageIdentity ||--o{ StageIdentityArtist : belongs_to
  StageIdentity ||--o{ RealPersonStageIdentity : voiced_by
  StageIdentity ||--o{ SetlistItemMember : performs_as
  RealPerson ||--o{ RealPersonTranslation : has
  RealPerson ||--o{ RealPersonStageIdentity : voices
  RealPerson ||--o{ SetlistItemMember : performs_in
  EventSeries ||--o{ EventSeriesTranslation : has
  EventSeries ||--o{ Event : contains
  Event ||--o{ Event : groups
  Event ||--o{ EventTranslation : has
  Event ||--o{ SetlistItem : has
  SetlistItem ||--o{ SetlistItemMember : performed_by
  Song ||--o{ Song : base_of
  Song ||--o{ SongTranslation : has
  Song ||--o{ SetlistItem : included_in
  Song ||--o{ AlbumTrack : appears_on
  Album ||--o{ AlbumTranslation : has
  Album ||--o{ AlbumTrack : contains
`;
const { svg } = await mermaid.render('erd1-svg', diagram);
document.getElementById('erd1').innerHTML = svg;
document.querySelectorAll('#erd1 svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0],nums[2],nums[4],nums[6]], ys = [nums[1],nums[3],nums[5],nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys), w = Math.max(...xs)-x, h = Math.max(...ys)-y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x',x); rect.setAttribute('y',y);
  rect.setAttribute('width',w); rect.setAttribute('height',h); rect.setAttribute('rx','8');
  for (const a of ['fill','stroke','stroke-width','class','style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a,firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd1 svg .row-rect-odd path, #erd1 svg .row-rect-even path').forEach(p => p.setAttribute('stroke','none'));
</script>
</body></html>
