name: Migrate Dev DB

on:
  push:
    branches: [dev]

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Push schema to dev DB
        env:
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL_UNPOOLED }}
        run: npx prisma db push
