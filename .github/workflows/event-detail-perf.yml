name: perf — event detail TTFB

# Non-blocking informational check. Builds the PR's merge commit
# (`refs/pull/N/merge` — GitHub's auto-generated test-merge of the
# PR head onto current base) AND the base branch tip in parallel
# checkout dirs, runs `next start` on each in turn against the dev
# DB, measures warm TTFB for the same 6 (locale × event) combos
# under identical runner conditions, then comments the delta and
# sets a commit status named `perf/event-detail-ttfb`.
#
# This status check is intentionally NOT added to branch protection's
# required-checks list — a regression appears as a red ✗ in the PR's
# checks panel but does NOT block merge. The reviewer decides whether
# the regression is intentional (a new feature legitimately adds
# queries) or a real perf bug that should be fixed before merge.
# Required CI gates (Typecheck + Test, Semgrep, Vercel deploy,
# CodeRabbit) continue to enforce normally.
#
# Why merge-commit + local build instead of Vercel preview URLs:
# the prior implementation curl'd Vercel preview deployments (PR
# preview vs latest dev preview). That had two systematic problems:
#
#   1. The PR's preview is built from the PR's HEAD, not the merge
#      result. A README-only PR opened off stale dev would show a
#      fake "regression" because its preview deployed un-optimized
#      code, while base preview had the optimization. The merge
#      commit is what dev would actually look like post-merge.
#
#   2. Per-deployment Vercel preview URLs scale to zero aggressively;
#      cold-start of a low-traffic preview can add 3-4s to the first
#      few requests. Even with warm-up, request-level lambda routing
#      can still hit cold instances. Comparing two preview URLs in
#      different "warmth" states produced uniform ~4.8s "regressions"
#      that disappeared on rebase.
#
# Building locally on the runner removes both. Both sides run under
# identical conditions (same runner, same Node version, same dev
# DB connection); the only difference is the code. The trade-off:
# we lose the ability to detect Vercel-specific regressions (cold-
# start, edge behavior, regional drift). For the F20 regression
# class (DB-query fan-out / Prisma include shape) the measurement
# is actually more reliable than the Vercel-preview approach.
#
# `paths-ignore` skips the workflow entirely when only markdown
# changes — those literally cannot affect TTFB and the workflow
# would just burn CI minutes producing zero signal.
#
# Thresholds chosen to absorb runner network jitter and DB-latency
# noise (Supabase Seoul ↔ Ubuntu runners is ~150-200ms RTT with
# some variance):
#   delta ≤ +30%   → ✓ success
#   delta > +30%   → ✗ failure ("review and merge if intentional")
#   delta > +100%  → ✗ failure ("likely real regression")
# Re-tune if false positives become noisy.

on:
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - "**/*.md"

# Cancel in-flight runs for the same PR when a new push lands.
# Without this, a slow earlier run could finish AFTER the fresh one
# and overwrite the live perf comment / commit status with stale
# numbers from the older head SHA.
concurrency:
  group: perf-event-detail-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  measure:
    name: TTFB regression vs base
    runs-on: ubuntu-latest
    # 30min covers two prod builds (~3min each), npm ci + prisma
    # generate (~1.5min each), warm-up + measurement loops (~3min
    # each), plus comment/status calls. Each phase has its own
    # natural cap (curl --max-time 30, server-readiness loop 30s),
    # so the timeout is the catch-all for genuine wedges.
    timeout-minutes: 30
    env:
      # Job-level env so every step inherits these without
      # re-declaring. GH_TOKEN authenticates `gh api`/`gh pr`; REPO
      # is the owner/name pair the API endpoints expect (also used
      # to bypass `gh pr comment`'s default git-remote inference).
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      # Dev DB — same pool the runtime queries hit on Vercel previews,
      # so query plans and roundtrip latencies match what the actual
      # app sees. Read-only in practice: the event detail page is
      # server-rendered SELECTs only, no mutations.
      DATABASE_URL: ${{ secrets.DEV_DATABASE_URL_UNPOOLED }}
      # Event IDs to sample. Currently:
      #   1 = "Love Live! Hasunosora 6th Live Dream ~Bloom Garden Party~ Day 1"
      #   2 = "Love Live! Hasunosora 6th Live Dream ~Bloom Garden Party~ Day 2"
      # Both are completed events with full setlists / reactions /
      # impressions populated, so every helper exercised by the page
      # returns non-empty data. If those rows ever get soft-deleted
      # or re-numbered in the dev DB, this list MUST be updated —
      # otherwise every measurement silently records 404s and the
      # delta becomes meaningless (the per-sample HTTP-200 filter
      # below at least surfaces this loudly rather than averaging
      # the 404s in).
      PERF_EVENT_IDS: "1 2"
    steps:
      # Two checkouts to separate paths. `refs/pull/N/merge` is
      # GitHub's auto-generated merge commit — base + PR's commits,
      # exactly the state dev would have post-merge. Only exists
      # when the PR is mergeable (no conflicts); if it doesn't exist
      # this checkout fails with a clear error, which is the right
      # behavior — the user needs to resolve conflicts before perf
      # is meaningful anyway.
      - name: Checkout PR merge commit
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          path: pr-merge

      - name: Checkout base tip
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: base

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          # Use the PR-merge lockfile as the cache key. When PR and
          # base have identical lockfiles (the common case), both
          # `npm ci` calls below hit the same cache. When they
          # differ, the second one downloads fresh — still cheaper
          # than no cache at all.
          cache-dependency-path: pr-merge/package-lock.json

      # Combined into one step so the bash measure_avg function is
      # defined once and reused for both sides without resorting to
      # script-file extraction. Step log is sequential and easy to
      # follow even at ~10min total.
      - name: Build + measure both sides
        id: measure
        run: |
          set -eo pipefail

          # Per-side measurement loop. Same shape as the manual
          # validation we've used since PR #260: warm-up pass to
          # discard cold-start timing, then 2 measurement passes
          # capturing HTTP status alongside TTFB. Non-200 samples
          # are excluded from the average and logged loudly; if
          # more than half the samples drop, the function returns
          # non-zero (the surrounding `set -eo pipefail` then fails
          # the step) rather than reporting a meaningless number.
          measure_avg() {
            local URL="$1"
            local LABEL="$2"
            for locale in ko ja en; do
              for id in $PERF_EVENT_IDS; do
                curl -s -o /dev/null --max-time 30 "$URL/$locale/events/$id" >/dev/null 2>&1 || true
              done
            done
            local times=()
            local non200=0
            local total=0
            for pass in 1 2; do
              for locale in ko ja en; do
                for id in $PERF_EVENT_IDS; do
                  total=$((total + 1))
                  RESP=$(curl -w '%{http_code} %{time_starttransfer}' -o /dev/null -s --max-time 30 \
                    "$URL/$locale/events/$id" 2>/dev/null || echo "000 30")
                  HTTP_CODE=$(echo "$RESP" | awk '{print $1}')
                  T=$(echo "$RESP" | awk '{print $2}')
                  if [ "$HTTP_CODE" = "200" ]; then
                    times+=("$T")
                    echo "$LABEL  $locale/$id  pass=$pass  http=$HTTP_CODE  ttfb=${T}s" >&2
                  else
                    non200=$((non200 + 1))
                    echo "$LABEL  $locale/$id  pass=$pass  http=$HTTP_CODE  ttfb=${T}s  ⚠️ EXCLUDED (non-200)" >&2
                  fi
                done
              done
            done
            if [ "$non200" -gt $((total / 2)) ]; then
              echo "$LABEL: $non200/$total samples were non-200; refusing to compute TTFB" >&2
              return 1
            fi
            printf '%s\n' "${times[@]}" | awk '{s+=$1; n++} END {printf "%.3f\n", s/n}'
          }

          # Wait for next start to bind port 3000.
          wait_for_server() {
            local LABEL="$1"
            for i in $(seq 1 30); do
              if curl -s -o /dev/null --max-time 1 http://localhost:3000/ 2>/dev/null; then
                echo "$LABEL server ready in ${i}s" >&2
                return 0
              fi
              sleep 1
            done
            echo "$LABEL server failed to bind port 3000 within 30s" >&2
            return 1
          }

          # Reliably stop next start. `npm run start` spawns
          # `next start` as a child; killing the npm process doesn't
          # always cascade. pkill -f matches the actual server
          # process. Sleep + fuser is a paranoid fallback to ensure
          # port 3000 is free for the second build's server.
          stop_server() {
            pkill -f "next start" 2>/dev/null || true
            sleep 1
            fuser -k 3000/tcp 2>/dev/null || true
            sleep 1
          }

          echo "::group::Build PR merge commit"
          cd pr-merge
          npm ci
          npx prisma generate
          npm run build
          echo "::endgroup::"

          echo "::group::Measure PR merge commit TTFB"
          npm run start > /tmp/pr-server.log 2>&1 &
          wait_for_server "PR"
          PR_AVG=$(measure_avg "http://localhost:3000" "PR")
          stop_server
          cd ..
          echo "::endgroup::"

          echo "::group::Build base tip"
          cd base
          npm ci
          npx prisma generate
          npm run build
          echo "::endgroup::"

          echo "::group::Measure base TTFB"
          npm run start > /tmp/base-server.log 2>&1 &
          wait_for_server "BASE"
          BASE_AVG=$(measure_avg "http://localhost:3000" "BASE")
          stop_server
          cd ..
          echo "::endgroup::"

          echo "pr_avg=$PR_AVG" >> "$GITHUB_OUTPUT"
          echo "base_avg=$BASE_AVG" >> "$GITHUB_OUTPUT"
          echo "PR avg: ${PR_AVG}s  |  Base avg: ${BASE_AVG}s"

      - name: Compare, comment, set status
        env:
          PR_AVG: ${{ steps.measure.outputs.pr_avg }}
          BASE_AVG: ${{ steps.measure.outputs.base_avg }}
          PR_NUM: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -eo pipefail
          DELTA_PCT=$(awk "BEGIN { printf \"%.1f\", (($PR_AVG - $BASE_AVG) / $BASE_AVG) * 100 }")
          STATE="success"
          VERDICT="within ±30% threshold ✅"
          if awk "BEGIN { exit !($DELTA_PCT > 100) }"; then
            STATE="failure"
            VERDICT="exceeds +100% — likely real regression ❌"
          elif awk "BEGIN { exit !($DELTA_PCT > 30) }"; then
            STATE="failure"
            VERDICT="exceeds +30% — review and merge if intentional ⚠️"
          fi
          DESC="${PR_AVG}s vs base ${BASE_AVG}s (${DELTA_PCT}%)"
          BODY=$(cat <<EOF
          ## perf — event detail TTFB

          | | warm avg (12 samples: 6 locale × event combos × 2 passes) |
          |---|---|
          | PR merge commit | **${PR_AVG}s** |
          | base (${BASE_REF} tip) | ${BASE_AVG}s |
          | delta | **${DELTA_PCT}%** — ${VERDICT} |

          Measurement runs both sides under identical conditions on the GitHub Actions runner (same Node, same dev DB, same network). The PR side is the GitHub-computed merge commit (\`refs/pull/${PR_NUM}/merge\`) — what \`${BASE_REF}\` would actually look like post-merge — not the PR's standalone Vercel preview.

          This is a **non-blocking informational check**. Merge despite a failure if the regression is expected (e.g. a new feature legitimately needs more queries). Required CI gates remain enforced separately.
          EOF
          )
          # --edit-last + --create-if-none: replace the previous perf
          # comment in place rather than appending a new one on every
          # push, so an active PR shows one living result instead of a
          # comment per CI run. Falls back to creating the first time.
          # --repo is required because this step doesn't run inside
          # one of the actions/checkout working trees, and `gh pr
          # comment` defaults to inferring the repo from `git remote
          # get-url`.
          gh pr comment --repo "$REPO" "$PR_NUM" \
            --edit-last --create-if-none \
            --body "$BODY"
          # target_url makes the perf/event-detail-ttfb badge in the
          # checks panel link to this workflow run, so a reviewer can
          # click through to inspect the per-sample TTFB output without
          # hunting for the run.
          gh api -X POST \
            "/repos/$REPO/statuses/$HEAD_SHA" \
            -f state="$STATE" \
            -f context="perf/event-detail-ttfb" \
            -f description="$DESC" \
            -f target_url="$GITHUB_SERVER_URL/$REPO/actions/runs/$GITHUB_RUN_ID"
