name: Migrate Production DB

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      accept_data_loss:
        description: 'Allow destructive schema changes (drops enum values, columns, etc.)'
        type: boolean
        required: false
        default: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Push schema to production DB
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL_UNPOOLED }}
          ACCEPT_DATA_LOSS: ${{ inputs.accept_data_loss }}
        run: |
          if [ "$ACCEPT_DATA_LOSS" = "true" ]; then
            echo "Running with --accept-data-loss (manual dispatch)"
            npx prisma db push --accept-data-loss
          else
            npx prisma db push
          fi
      - name: Apply post-deploy SQL (idempotent partial indexes etc.)
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL_UNPOOLED }}
        run: npx prisma db execute --file prisma/post-deploy.sql
      - name: Verify migration
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL_UNPOOLED }}
        run: npx prisma db pull --print
