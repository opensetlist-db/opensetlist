<svg width="280" height="48" viewBox="0 0 280 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#0277BD"/>
    </linearGradient>
  </defs>

  <!-- symbol icon 40x40, vertically centered -->
  <rect y="4" width="40" height="40" rx="9" fill="url(#bg)"/>
  <rect y="4" width="40" height="20" rx="9" fill="white" fill-opacity="0.06"/>

  <!-- row 1: check -->
  <circle cx="11" cy="18" r="3.2" fill="white"/>
  <path d="M8.5 18 L10.5 20.5 L14.5 15" fill="none" stroke="#0277BD" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="16" y1="18" x2="32" y2="18" stroke="white" stroke-width="2.4" stroke-linecap="round"/>

  <!-- row 2: dot + line -->
  <circle cx="11" cy="25" r="1.8" fill="white" fill-opacity="0.75"/>
  <line x1="14.5" y1="25" x2="31" y2="25" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- row 3: dot + line -->
  <circle cx="11" cy="32" r="1.8" fill="white" fill-opacity="0.75"/>
  <line x1="14.5" y1="32" x2="29" y2="32" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- row 4: dot + line + note -->
  <circle cx="11" cy="39" r="1.8" fill="white" fill-opacity="0.75"/>
  <line x1="14.5" y1="39" x2="27" y2="39" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="31" y1="34" x2="31" y2="40.5" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M31 34 Q36.5 36.5 35 41" fill="none" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
  <ellipse cx="28.5" cy="41.5" rx="3.2" ry="2.2" fill="white" transform="rotate(-18 28.5 41.5)"/>

  <!-- wordmark: OPENSETLIST in Josefin Sans style -->
  <!-- Using system fallback since SVG embeds fonts via CSS -->
  <text
    x="52"
    y="30"
    font-family="'Josefin Sans', 'Futura', 'Century Gothic', sans-serif"
    font-weight="400"
    font-size="18"
    fill="#1a1a1a"
    letter-spacing="0"
    dominant-baseline="middle"
    style="text-transform: uppercase;"
  >OPENSETLIST</text>
</svg>
